name: Build XD4000 Phase5E TCP RTU Oscilloscope Windows EXE
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
      - name: Check syntax
        shell: cmd
        run: python -m py_compile app\main.py
      - name: Build EXE
        shell: cmd
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed ^
            --name LK_XD4000_Phase5E_TCP_RTU_Oscilloscope ^
            --add-data "data;data" ^
            app\main.py
      - uses: actions/upload-artifact@v4
        with:
          name: LK_XD4000_Phase5E_TCP_RTU_Oscilloscope-Windows-EXE
          path: dist/LK_XD4000_Phase5E_TCP_RTU_Oscilloscope.exe
          if-no-files-found: error
